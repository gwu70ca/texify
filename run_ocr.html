<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Process OCR</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    h1 { color: #333; }
    button { padding: 10px 20px; background-color: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; margin-top: 1rem; }
    button:hover { background-color: #005a9e; }
    a { color: #0078d4; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload Successful</h1>
    <p><a href="{blob_url}" target="_blank">View Uploaded Image</a></p>
    <form action="/api/img_ocr" method="post">
      <input type="hidden" name="img_url" value="{blob_url}">
      <button type="submit">Run OCR</button>
    </form>
  </div>
</body>
</html>
